<!DOCTYPE html>
<html>
<head>
    <!-- Load ioBroker scripts and styles-->
    <link rel="stylesheet" type="text/css" href="../../css/adapter.css" />
    <link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css">

    <script type="text/javascript" src="../../lib/js/jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="../../socket.io/socket.io.js"></script>

    <script type="text/javascript" src="../../js/translate.js"></script>
    <script type="text/javascript" src="../../lib/js/materialize.js"></script>
    <script type="text/javascript" src="../../js/adapter-settings.js"></script>

    <!-- Load our own files -->
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script type="text/javascript" src="words.js"></script>

    <script type="text/javascript">
        // This will be called by the admin adapter when the settings page loads
        function load(settings, onChange) {
            // example: select elements with id=key and class=value and insert value
            if (!settings) return;
            $('.value').each(function () {
                var $key = $(this);
                var id = $key.attr('id');
                if ($key.attr('type') === 'checkbox') {
                    // do not call onChange direct, because onChange could expect some arguments
                    $key.prop('checked', settings[id])
                        .on('change', () => onChange())
                        ;
                } else {
                    // do not call onChange direct, because onChange could expect some arguments
                    $key.val(settings[id])
                        .on('change', () => onChange())
                        .on('keyup', () => onChange())
                        ;
                }
            });
            onChange(false);
            // reinitialize all the Materialize labels on the page if you are dynamically adding inputs:
            if (M) M.updateTextFields();
            
            // Setup test connection button
            $('#test-connection').on('click', function() {
                testConnection();
            });
        }

        // This will be called by the admin adapter when the user presses the save button
        function save(callback) {
            // example: select elements with class=value and build settings object
            var obj = {};
            $('.value').each(function () {
                var $this = $(this);
                if ($this.attr('type') === 'checkbox') {
                    obj[$this.attr('id')] = $this.prop('checked');
                } else {
                    obj[$this.attr('id')] = $this.val();
                }
            });
            callback(obj);
        }
        
        // Test connection to ACM200
        function testConnection() {
            var host = $('#host').val();
            var port = $('#port').val();
            var username = $('#username').val();
            var password = $('#password').val();
            
            if (!host) {
                showError('Please enter a host address');
                return;
            }
            
            $('#test-connection').addClass('disabled');
            $('#test-connection-icon').addClass('rotating');
            $('#test-connection-text').text('Testing...');
            $('#connection-status').hide();
            
            // Create a test socket to try to connect
            var socket = new WebSocket('ws://' + host + ':' + port);
            var testTimeout = setTimeout(function() {
                socket.close();
                showError('Connection timed out');
                resetTestButton();
            }, 5000);
            
            socket.onopen = function() {
                clearTimeout(testTimeout);
                socket.close();
                showSuccess('Connection successful!');
                resetTestButton();
            };
            
            socket.onerror = function(error) {
                clearTimeout(testTimeout);
                showError('Connection failed: ' + error.message);
                resetTestButton();
            };
        }
        
        function showError(message) {
            $('#connection-status')
                .removeClass('success-text')
                .addClass('error-text')
                .text(message)
                .show();
        }
        
        function showSuccess(message) {
            $('#connection-status')
                .removeClass('error-text')
                .addClass('success-text')
                .text(message)
                .show();
        }
        
        function resetTestButton() {
            $('#test-connection').removeClass('disabled');
            $('#test-connection-icon').removeClass('rotating');
            $('#test-connection-text').text('Test Connection');
        }
    </script>

    <style>
        .m .col .select-wrapper + label {
            top: -26px;
        }
        .m span{
            font-size: 0.9em;
        }
        .m .tabs {
            height: 48px;
        }
        .m .page {
            height: calc(100% - 48px);
        }
        .success-text {
            color: #4caf50;
        }
        .error-text {
            color: #f44336;
        }
        .rotating {
            animation: rotating 2s linear infinite;
        }
        @keyframes rotating {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="m adapter-container">
        <div class="row">
            <div class="col s12">
                <ul class="tabs">
                    <li class="tab col s3"><a href="#tab-main" class="translate active">Main settings</a></li>
                    <li class="tab col s3"><a href="#tab-advanced" class="translate">Advanced</a></li>
                </ul>
            </div>

            <!-- Main Settings Tab -->
            <div id="tab-main" class="col s12 page">
                <div class="row">
                    <div class="col s12 m8 l7">
                        <div class="card">
                            <div class="card-content">
                                <span class="card-title">Connection Settings</span>
                                
                                <div class="row">
                                    <div class="col s12 m6 input-field">
                                        <input class="value" id="host" type="text" />
                                        <label for="host" class="translate">IP Address</label>
                                        <span class="helper-text">Default: 192.168.0.225</span>
                                    </div>
                                    <div class="col s12 m6 input-field">
                                        <input class="value" id="port" type="number" min="1" max="65535" />
                                        <label for="port" class="translate">Port</label>
                                        <span class="helper-text">Default Telnet port: 23</span>
                                    </div>
                                </div>
                                
                                <div class="row">
                                    <div class="col s12 m6 input-field">
                                        <input class="value" id="username" type="text" />
                                        <label for="username" class="translate">Username</label>
                                        <span class="helper-text">Default: admin</span>
                                    </div>
                                    <div class="col s12 m6 input-field">
                                        <input class="value" id="password" type="password" />
                                        <label for="password" class="translate">Password</label>
                                        <span class="helper-text">Default: 1234</span>
                                    </div>
                                </div>
                                
                                <div class="row">
                                    <div class="col s12 center-align">
                                        <button class="btn waves-effect waves-light" id="test-connection">
                                            <i class="material-icons left" id="test-connection-icon">network_check</i>
                                            <span id="test-connection-text">Test Connection</span>
                                        </button>
                                        <p id="connection-status" style="display:none;"></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Advanced Settings Tab -->
            <div id="tab-advanced" class="col s12 page">
                <div class="row">
                    <div class="col s12 m8 l7">
                        <div class="card">
                            <div class="card-content">
                                <span class="card-title">Advanced Settings</span>
                                
                                <div class="row">
                                    <div class="col s12 m6 input-field">
                                        <input class="value" id="pollInterval" type="number" min="1000" />
                                        <label for="pollInterval" class="translate">Polling Interval (ms)</label>
                                        <span class="helper-text">Default: 30000 (30 seconds)</span>
                                    </div>
                                    <div class="col s12 m6 input-field">
                                        <input class="value" id="timeout" type="number" min="500" />
                                        <label for="timeout" class="translate">Command Timeout (ms)</label>
                                        <span class="helper-text">Default: 5000 (5 seconds)</span>
                                    </div>
                                </div>
                                
                                <div class="row">
                                    <div class="col s12">
                                        <p class="note">
                                            <i class="material-icons">info_outline</i>
                                            Shorter polling intervals provide more frequent updates but increase network traffic.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
